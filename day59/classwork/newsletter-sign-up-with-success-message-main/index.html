<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sign-up form start -->

  <!-- Stay updated!

  Join 60,000+ product managers receiving monthly updates on:

  Product discovery and building what matters
  Measuring to ensure updates are a success
  And much more!

  Email address
  email@company.com

  Subscribe to monthly newsletter -->

  <!-- Sign-up form end -->

  <!-- Success message start -->

  <!-- Thanks for subscribing!

  A confirmation email has been sent to ash@loremcompany.com. 
  Please open it and click the button inside to confirm your subscription.

  Dismiss message -->

  <!-- Success message end -->
  
  <div id="container">
    <div id="mainest">
      <div id="main">
        <div id="stay">
          <h1>Stay updated!</h1>
          <p id="join">Join 60,000+ product managers receiving monthly updates on:</p>
          <div id="verified1">
            <div class="verified">
              <img src="./assets/images/icon-list.svg" alt="">
              <p class="p">Product discovery and building what matters</p>
            </div>
            <div class="verified">
              <img src="./assets/images/icon-list.svg" alt="">
              <p class="p">Measuring to ensure updates are a success</p>
            </div>
            <div class="verified"> 
              <img src="./assets/images/icon-list.svg" alt="">
              <p class="p">And much more!</p>
            </div>
          </div>
          <form action="">
            <p id="email">Email address</p>
            <input type="email" placeholder="email@company.com">
            <button>Subscribe to monthly newsletter</button>
          </form>
          
        </div>
        <div id="image">
          <!-- nothing -->
        </div>
      </div>
    </div>
  </div>

</body>
</html>
