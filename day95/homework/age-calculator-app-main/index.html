<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Age calculator app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Day
  DD

  Month
  MM

  Year
  YYYY

  -- years
  -- months
  -- days -->

    <div id="body">
      <div id="main">
        <div id="inputs">
          <div class="input">
            <label for="day">DAY</label>
            <input type="text" id="day" placeholder="DD" />
          </div>
          <div class="input">
            <label for="month">MONTH</label>
            <input type="text" id="month" placeholder="MM" />
          </div>
          <div class="input">
            <label for="year">YEAR</label>
            <input type="text" id="year" placeholder="YYYY" />
          </div>
          <div id="button">
            <button><img src="./assets/images/icon-arrow.svg" alt="" /></button>
          </div>
        </div>
        <div id="content">
          <h1><span id="yearres">- -</span>years</h1>
          <h1><span id="monthres">- -</span>months</h1>
          <h1><span id="dayres">- -</span>days</h1>
        </div>
      </div>
    </div>

    <script src="./script.js" type="module"></script>
  </body>
</html>
