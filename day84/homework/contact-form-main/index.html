<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Contact form</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Contact Us

  First Name
  This field is required

  Last Name
  This field is required

  Email Address
  Please enter a valid email address
  This field is required

  Query Type
  General Enquiry
  Support Request
  Please select a query type

  Message
  This field is required

  I consent to being contacted by the team
  To submit this form, please consent to being contacted

  Submit

  Message Sent!
  Thanks for completing the form. We'll be in touch soon! -->

    <div id="body">
      <div id="main">
        <form>
          <h2>Contact Us</h2>
          <div id="names">
            <div id="firn">
              <p>First Name</p>
              <input type="text" name="firstname" id="first" />
            </div>
            <div id="lans">
              <p>Last Name</p>
              <input type="text" name="lastname" id="last" />
            </div>
          </div>
          <div id="email1">
            <p>Email Address</p>
            <input type="email" name="email" id="email" />
          </div>
          <div id="query">
            <p>Query Type</p>
            <div id="gensup">
              <div id="quinp">
                <input type="radio" name="query" id="general" value="general" />
                <label for="general">General Enquiry</label>
              </div>
              <div id="quinp2">
                <input type="radio" name="query" id="support" value="support" />
                <label for="support">Support Request</label>
              </div>
            </div>
          </div>
          <div id="message">
            <p>Message</p>
            <input type="text" name="message" id="message1" />
          </div>
          <div id="consent">
            <input type="checkbox" name="consent" id="consent" />
            <label for="consent"
              >I consent to being contacted by the team</label
            >
          </div>
          <div id="submit">
            <button>Submit</button>
          </div>
        </form>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
