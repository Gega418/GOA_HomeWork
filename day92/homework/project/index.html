<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="body">
        <div id="main">
            <div id="devf">
                <div id="logo">devfinder</div>
                <div id="lightic">
                    <div id="lighttex">LIGHT</div>
                    <div id="lightico">
                        <img src="./light_mode_30dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="">
                    </div>
                </div>
            </div>
            <div id="searchsec">
                <div id="searchico">
                    <img src="./search_35dp_206AE6_FILL0_wght400_GRAD0_opsz40.svg" alt="">
                </div>
                <form>
                    <input type="text" name="searchinput" id="searchinput" placeholder="Search GitHub username..." autocomplete="off">
                    <button id="searchbtn">Search</button>
                </form>  
            </div>
            <div id="profilesec">
                <div id="avatarcol">
                    <div id="avatarphot">
                        <img src="./github.png" alt="Octocat" id="avatarimg">
                    </div>
                </div>
                <div id="contentcol">
                    <div id="profilehead">
                        <div id="about">
                            <h2 id="username">The Octocat</h2>
                            <p id="usersom">@octocat</p>
                        </div>
                        <div id="joined">
                            <p id="joindate">Joined <span>25 Jan 2011</span></p>
                        </div>
                    </div>
                    <div id="bio">
                        <p id="biotext">This profile has no bio</p>
                    </div>
                    <div id="stats">
                        <div class="stat">
                            <p class="stat1">Repos</p>
                            <h2 class="stat2" id="repositories">8</h2>
                        </div>
                        <div class="stat">
                            <p class="stat1">Followers</p>
                            <h2 class="stat2" id="followers">3938</h2>
                        </div>
                        <div class="stat">
                            <p class="stat1">Following</p>
                            <h2 class="stat2" id="following">9</h2>
                        </div>
                    </div>
                    <div id="links">
                        <div class="link">
                            <div class="linkicon">
                               <img src="./location_on_25dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="">
                            </div>
                            <h2 class="linktext">San Francisco</h2>
                        </div>
                        <div id="linkdisabled">
                            <div class="linkicon">
                                <img src="./home_25dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="">
                            </div>
                            <h2 class="linktext">Not Available</h2>
                        </div>
                        <div class="link">
                            <div class="linkicon">
                                <img src="./link_2_25dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="">
                            </div>
                            <h2 class="linktext">https://github.blog</h2>
                        </div>
                        <div class="link">
                            <div class="linkicon">
                                <img src="./domain_25dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="">
                            </div>
                            <h2 class="linktext">@github</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js" type="module"></script>
</body>
</html>
