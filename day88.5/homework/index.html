<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div id="body">
        <div id="header">
            <div id="logo">CLOTHES-SHOP</div>
            <div id="cartinf">კალათა (0)</div>
        </div>
        <div id="newcol">
            <h1>ახალი კოლექცია</h1>
            <p>საუკეთესო ხარისხი და სტილი</p>
        </div>
        <div id="products">
            <div class="productcard">
                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" alt="პერანგი">
                <div class="productinf">
                    <h3>თეთრი მაისური</h3>
                    <div class="price">50.00 ₾</div>
                    <button class="addbtn">კალათაში დამატება</button>
                </div>
            </div>
            <div class="productcard">
                <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500" alt="ქურთუკი">
                <div class="productinf">
                    <h3>ქურთუკი</h3>
                    <div class="price">120.00 ₾</div>
                    <button class="addbtn">კალათაში დამატება</button>
                </div>
            </div>
            <div class="productcard">
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500" alt="კაბა">
                <div class="productinf">
                    <h3>სპორტული შარვალი</h3>
                    <div class="price">80.00 ₾</div>
                    <button class="addbtn">კალათაში დამატება</button>
                </div>
            </div>
            <div class="productcard">
                <img src="https://images.unsplash.com/photo-1554568218-0f1715e72254?w=500" alt="მაისური">
                <div class="productinf">
                    <h3>მაისური</h3>
                    <div class="price">45.00 ₾</div>
                    <button class="addbtn">კალათაში დამატება</button>
                </div>
            </div>
        </div>

        <div id="cart">

        </div>
    </div>
    <script src="./script.js" type="module"></script>
</body>
</html>
